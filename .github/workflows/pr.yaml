name: CI Pipeline

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_MEMBER_SECRET: ${{ secrets.JWT_MEMBER_SECRET }}
      JWT_MEMBER_REFRESH_SECRET: ${{ secrets.JWT_MEMBER_REFRESH_SECRET }}
      ADMIN_JWT_SECRET: ${{ secrets.ADMIN_JWT_SECRET }}
      ADMIN_JWT_REFRESH_SECRET: ${{ secrets.ADMIN_JWT_REFRESH_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build Next.js app
        run: pnpm run build

      - name: Lint Next.js app
        run: pnpm run lint
